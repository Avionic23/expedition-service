name: CI

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: expedition_db
          POSTGRES_USER: expedition_user
          POSTGRES_PASSWORD: expedition_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expedition_user -d expedition_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://expedition_user:expedition_pass@localhost:5432/expedition_db
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: test-secret-key
      DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest tests/
