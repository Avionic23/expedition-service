name: Deploy to Minikube

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted   
    steps:
      - uses: actions/checkout@v4

      - name: Build image inside Minikube
        run: minikube image build -t expedition-service:${{ github.sha }} .

      - name: Deploy to cluster
        run: kubectl set image deployment/expedition-service expedition-service=expedition-service:${{ github.sha }}
